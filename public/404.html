<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Arch AI Tool</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0f1115;
        color: #f3f4f6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 640px;
        padding: 48px 40px;
        background: #171a21;
        border: 1px solid #2a2f3a;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      h1 {
        font-size: 40px;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 24px;
        color: #cbd5f5;
        line-height: 1.6;
        font-size: 16px;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        display: inline-block;
        padding: 12px 20px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
      }
      .primary {
        background: #ffffff;
        color: #111827;
      }
      .secondary {
        border: 1px solid #3b4252;
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404 — Page not found</h1>
      <p>
        The page you requested does not exist or has moved. Explore the directory
        to get back on track.
      </p>
      <div class="actions">
        <a class="primary" href="/tools">Browse tools</a>
        <a class="secondary" href="/">Go home</a>
      </div>
    </main>
  </body>
</html>
